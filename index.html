<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jade ASMR</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background-color: #121212;
        }

        /* Настройки для фонового видео */
        .background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Затемнение фона */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
            z-index: 2;
        }

        /* Стилизация кнопки */
        .of-button {
            position: relative;
            z-index: 3;
            display: inline-block;
            padding: 24px 40px;
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            background: rgba(0, 175, 240, 0.85); 
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 175, 240, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            max-width: 90%;
            margin-top: 150px; 
            cursor: pointer;
        }

        .of-button:hover {
            background-color: rgba(0, 140, 192, 0.95);
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 175, 240, 0.7);
        }
    </style>
</head>
<body>

    <video class="background-video" autoplay loop muted playsinline>
        <source src="0706(1).mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <a id="of-link" class="of-button">Solo Tu y Yo / Only You and Me 🫶</a>

    <script>
        document.getElementById('of-link').addEventListener('click', function(e) {
            e.preventDefault();
            
            var targetUrl = "https://onlyfans.com/jadelyn";
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // 1. Проверка на Android
            if (/Android/i.test(userAgent)) {
                window.location.href = "intent://" + targetUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
                return;
            }

            // 2. Хак для iOS (iPhone / iPad) внутри ин-апп браузеров (Instagram, TikTok)
            if (/iPhone|iPad|iPod/i.test(userAgent) && (userAgent.includes('Instagram') || userAgent.includes('FBAN') || userAgent.includes('FBAV') || userAgent.includes('Twitter'))) {
                
                // Создаем Blob-файл со скриптом автоматического редиректа
                var blobContent = `<script>window.location.href="${targetUrl}";<\/script>`;
                var blob = new Blob([blobContent], { type: 'text/html' });
                var blobUrl = URL.createObjectURL(blob);

                // Создаем невидимую ссылку для скачивания/открытия Blob
                var a = document.createElement('a');
                a.href = blobUrl;
                // Трюк: заставляем iOS думать, что это скачивание файла, ломая ин-апп контекст
                a.download = "redirect.html"; 
                document.body.appendChild(a);
                a.click();
                
                // Мягкий фолбек, если интент загрузки сработал как обычный переход
                setTimeout(function() {
                    window.location.href = targetUrl;
                }, 300);
                return;
            }

            // 3. Дефолтный переход для обычных браузеров (ПК, Safari вне Инсты и т.д.)
            window.location.href = targetUrl;
        });
    </script>

</body>
</html>
